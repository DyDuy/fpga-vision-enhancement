name: Sync to Lab Repository

on:
  push:
    branches:
      - main  # Tự động chạy mỗi khi bạn push code lên nhánh main cá nhân

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Lab Repository
        run: |
          # Thiết lập cấu hình git tạm thời
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Thêm remote hướng về phía repo của PIISA Lab
          git remote add lab https://${{ secrets.LAB_GITHUB_TOKEN }}@github.com/PIISAlab/Design-and-implementation-of-a-vision-enhancement-system-on-the-FPGA-DE1-SoC-platform-.git
          
          # Thực hiện ép đồng bộ nhánh sang bên Lab
          git push lab main --force
