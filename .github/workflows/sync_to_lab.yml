name: Sync to Lab Repository

on:
  push:
    branches:
      - main
jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # QUAN TRỌNG: Tắt quyền bot mặc định để dùng Token cá nhân

      - name: Push to Lab Repository
        run: |
          # Thiết lập cấu hình git tạm thời
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Đẩy trực tiếp bằng URL có chứa mã Token bảo mật
          git push https://${{ secrets.LAB_GITHUB_TOKEN }}@github.com/PIISAlab/Design-and-implementation-of-a-vision-enhancement-system-on-the-FPGA-DE1-SoC-platform-.git main --force
